name: .NET

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
    - uses: actions/checkout@v4.2.2
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.1.0
      with:
        dotnet-version: 8.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ./ApiDoctor.sln

    - name: Build
      run: dotnet build ./ApiDoctor.sln --no-restore --configuration Release

    - name: Test
      if: matrix.os != 'ubuntu-latest'
      run: dotnet test ./ApiDoctor.sln --no-build --configuration Release --verbosity normal

    - name: Test with coverage
      if: matrix.os == 'ubuntu-latest'
      run: dotnet test ./ApiDoctor.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: ./coverage

    - name: Pack
      if: matrix.os == 'ubuntu-latest'
      run: dotnet pack ./ApiDoctor.Console/ApiDoctor.ConsoleApp.csproj --no-build --configuration Release --output ./packages

    - name: Upload package
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: ./packages
